<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daksh Earning Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h3 id="tab-title">Rewards</h3>
    </div>

    <div id="rewards" class="tab-content active-tab">
        <div class="card balance-card">
            <p>Your Balance</p>
            <h1 id="balance">0 🪙</h1>
        </div>
        <div class="card">
            <h4>Daily Bonus 🎁</h4>
            <p>Claim 10 coins every day!</p>
            <button class="btn" onclick="claimDaily()">Claim Now</button>
        </div>
        <div class="card">
            <h4>Refer & Earn 👥</h4>
            <p>Get 50 coins for each friend.</p>
            <button class="btn" style="background:#2ecc71;" onclick="inviteFriend()">Invite</button>
        </div>
    </div>
    
<div id="refer" class="tab-content">
    <div class="card balance-card">
        <h4>Refer & Earn 🚀</h4>
        <p>Har referral par paayein <b>50 Coins</b>!</p>
    </div>

    <div class="card">
        <p>Tera Referral Link:</p>
        <div id="display-link" style="background:#0f172a; padding:10px; border-radius:8px; font-size:12px; word-break:break-all; border:1px dashed var(--gold); margin-bottom:10px; color: var(--gold);">
            Loading link...
        </div>
        <button class="btn" onclick="inviteFriend()">Copy & Invite Friends</button>
    </div>
</div>
<div id="help" class="tab-content">
    

    <div id="help" class="tab-content">
        <div class="card">
            <h4>Support Center 🎧</h4>
            <p>Face any issue? Tell us!</p>
            <textarea id="support-msg" placeholder="Write your message..."></textarea>
            <button class="btn" onclick="sendSupport()">Send to Admin</button>
        </div>
        <div class="card">
            <h4>FAQ ❓</h4>
            <p><b>Withdraw limit:</b> 1000 Coins</p>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchTab('rewards', this)">
            <span>💰</span> Rewards
        </button>
        <button class="nav-item" onclick="switchTab('help', this)">
            <span>🎧</span> Support
        </button>
    </nav>

    
<nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('rewards', this)">
        <span>💰</span> Rewards
    </button>
    
    <button class="nav-item" onclick="switchTab('refer', this)">
        <span>👥</span> Refer
    </button>

    <button class="nav-item" onclick="switchTab('help', this)">
        <span>🎧</span> Support
    </button>
</nav>
    </nav>

    <script src="script.js"></script>

</body>
</html>
