<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daksh Grand Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Naye Sections ke liye thodi styling */
        .ads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ad-box { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; transition: 0.3s; }
        .ad-box:active { transform: scale(0.95); }
        .progress-container { background: #0f172a; border-radius: 20px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: #f1c40f; height: 100%; width: 0%; transition: 0.5s; }
        .sponsor-card { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 136, 204, 0.1); border: 1px solid #0088cc; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
        <h3 id="tab-title">Rewards</h3>
        <div style="display: flex; gap: 15px;">
            <div onclick="switchTab('leaderboard', this)" style="cursor: pointer; font-size: 20px;">🏆</div>
            <div onclick="switchTab('history', this)" style="cursor: pointer; font-size: 24px; color: var(--gold);">⋮</div>
        </div>
    </div>

    <div id="rewards" class="tab-content active-tab">
        
        <div class="card" style="border-left: 4px solid #f1c40f;">
            <h4 style="display: flex; justify-content: space-between;">
                Telegram Ads ⚡ <span id="ad-count-text" style="color: #f1c40f;">0/5</span>
            </h4>
            <div class="progress-container">
                <div id="ad-progress" class="progress-bar"></div>
            </div>
            <p style="font-size: 11px; color: #94a3b8;">Watch 5 ads daily to earn extra 50 coins!</p>
            <button class="btn" style="background: #f1c40f; color: #000; font-weight: bold;" onclick="watchAd()">Watch Ad & Earn (+10)</button>
        </div>

        <div class="card">
            <h4 style="color: #0088cc; margin-bottom: 10px;">Partnership & Sponsors 🤝</h4>
            <div id="sponsor-list">
                <div class="sponsor-card">
                    <div>
                        <p style="font-size: 14px; margin: 0;">Join Official Partner</p>
                        <span style="font-size: 11px; color: #0088cc;">+100 Coins</span>
                    </div>
                    <button class="btn-sm" style="background: #0088cc; padding: 5px 15px;" onclick="checkSponsor('@YourPartnerChannel')">Join & Verify</button>
                </div>
            </div>
        </div>

        <div class="card balance-card">
            <p>Your Balance</p>
            <h1 id="balance">0 🪙</h1>
        </div>

        <div class="card">
            <h4>Daily Bonus 🎁</h4>
            <p>Claim 10 coins every day!</p>
            <button class="btn" onclick="claimDaily()">Claim Now</button>
        </div>

        <div class="card">
            <h4>Withdraw 💸</h4>
            <p>Min. Limit: 1000 Coins</p>
            <input type="text" id="upi-id" placeholder="Enter UPI ID (name@apl)" 
                style="width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            <button class="btn" style="background: #e74c3c;" onclick="requestWithdraw()">Withdraw Now</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchTab('rewards', this)"><span>💰</span> Rewards</button>
        <button class="nav-item" onclick="switchTab('tasks', this)"><span>🌟</span> Tasks</button>
        <button class="nav-item" onclick="switchTab('refer', this)"><span>👥</span> Refer</button>
        <button class="nav-item" onclick="switchTab('help', this)"><span>🎧</span> Support</button>
    </nav>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
